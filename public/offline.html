<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>mujAnon — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --amber: #f59e0b; --bg: #0f0f17; --text: #e4e4e7; --muted: #52525b; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 40px 32px; max-width: 340px; width: 100%; }
    .emoji { font-size: 56px; margin-bottom: 16px; display: block; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 12px 24px; border-radius: 10px; background: linear-gradient(135deg, var(--amber), #fbbf24); border: none; color: #000; font-weight: 700; font-size: 14px; cursor: pointer; text-decoration: none; }
    .dots { display: flex; justify-content: center; gap: 6px; margin-top: 24px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(245,158,11,0.3); animation: blink 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0.3 } 40% { opacity: 1 } }
  </style>
</head>
<body>
  <div class="card">
    <span class="emoji">🌐</span>
    <h1>You're offline</h1>
    <p>mujAnon needs a connection to match you with anonymous MUJians. You'll reconnect automatically!</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
